# Task 2: Classification - Baseline Configuration
# Baseline configuration using MONAI ResNet-18 architecture.
# Switch architectures by changing model_type (resnet18 | resnet50 | densenet121).

experiment_name: "baseline_resnet18"
group_number: 0  # Your group number — used to name the output CSV (e.g. group0_task2_results.csv)

# Model architecture
model:
  model_type: "resnet18"  # Options: resnet18 | resnet50 | densenet121
  num_classes: 5
  # Class names in label-index order (assigned alphabetically by NIfTIDataset):
  #   0: BCLM  (Breast Cancer Liver Metastasis)
  #   1: CRLM  (Colorectal Cancer Liver Metastasis)
  #   2: HCC   (Hepatocellular Carcinoma)
  #   3: HH    (Hepatic Haemangioma)
  #   4: ICC   (Intrahepatic Cholangiocarcinoma)
  class_names:
    - BCLM
    - CRLM
    - HCC
    - HH
    - ICC

  # Architecture-specific parameters — only the block matching model_type is used.
  resnet18:
    conv1_t_size:   7   # depth-axis kernel size for the first conv layer
    conv1_t_stride: 1   # use 1 for 64^3 volumes (avoids over-striding)

  resnet50:
    conv1_t_size:   7   # depth-axis kernel size for the first conv layer
    conv1_t_stride: 2   # stride 2 helps downsample the depth axis faster (saves memory)

  densenet121:
    growth_rate:  32    # feature maps added per dense layer
    bn_size:       4    # bottleneck size multiplier (bn_size × growth_rate channels)
    dropout_prob: 0.0   # per-layer dropout (try 0.1–0.2 to combat overfitting)

# Training parameters
training:
  epochs: 10
  batch_size: 2
  num_workers: 1
  validation_interval: 1
  patience: 1
  # Cross-validation: set k_folds > 1 to enable stratified k-fold CV.
  # When enabled, train_val_split is ignored; each fold uses (k-1)/k data
  # for training and 1/k for validation. A fresh model is trained per fold.
  k_folds: 1          # 0 or 1 = standard single split; 5 = 5-fold CV
  
  # Spatial size for resizing ROIs (z, y, x) order (default: 64x64x64 for GPU memory).
  # Pre-extracted ROI size is (74, 354, 432). Reduce for faster training, increase for better metrics.
  spatial_size: [64, 64, 64]
  
  # Enable data augmentation during training (rotation, flip, noise, contrast).
  enable_augmentation: false

# Data paths
data:
  train_dir: "/path/to/roi_data"
  labels_csv: "/path/to/labels.csv"
  val_dir: null
  val_labels_csv: null  # CSV file for validation data (required if val_dir is specified)
  val_fraction: 0.1  # Fraction of training data reserved for validation
  enable_stratified_split: false  # Use stratified splitting to ensure balanced class distribution in train/val

# Optimizer
optimizer:
  type: "adam"              # Options: adam | sgd | adamw
  lr: 1e-1                  # Learning rate (overrides model.learning_rate if set)
  weight_decay: 1e-1        # Weight decay (overrides model.weight_decay if set)
  # SGD-specific parameters (ignored for adam/adamw)
  momentum: 0.9
  # Adam/AdamW-specific parameters
  betas: [0.9, 0.999]       # (beta1, beta2) for momentum and RMSprop
  eps: 1e-8                 # Numerical stability constant

# Loss
loss:
  type: "cross_entropy"     # Options: cross_entropy | focal_loss
  class_weights: null       # Per-class weights [w0, w1, w2, ...] or null for uniform

# Output
output:
  checkpoint_dir: "./model_checkpoints"
